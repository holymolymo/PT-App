<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Português">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#006B3C" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1c1e"  media="(prefers-color-scheme: dark)">

  <title>Aprender Português</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ── Home ── -->
  <div id="screen-home" class="screen active">
    <div id="home-content"></div>
  </div>

  <!-- ── Lernen ── -->
  <div id="screen-learn" class="screen">
    <div id="learn-content">
      <div class="pre-session">
        <div class="pre-icon">📚</div>
        <h2>Hey, bereit für heute?</h2>
        <p>Lass uns loslegen! Deine 30-Minuten-Session wartet.</p>
        <div class="session-plan">
          <div>🔄 <b>10 Min</b> – Wiederholung fälliger Karten</div>
          <div>✨ <b>15 Min</b> – Neuer Stoff</div>
          <div>📊 <b>5 Min</b> – Auswertung</div>
        </div>
        <button class="btn-primary" onclick="App.startSession()">Session starten</button>
      </div>
    </div>
  </div>

  <!-- ── Fortschritt ── -->
  <div id="screen-progress" class="screen">
    <div id="progress-content"></div>
  </div>

  <!-- ── Einstellungen ── -->
  <div id="screen-settings" class="screen">
    <div id="settings-content"></div>
  </div>

  <!-- ── Tab Bar ── -->
  <nav id="tab-bar">
    <button class="tab-item active" data-screen="home">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M3 12.5l9-9 9 9M5 11v8a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-item" data-screen="learn">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="tab-label">Lernen</span>
    </button>
    <button class="tab-item" data-screen="progress">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="tab-label">Fortschritt</span>
    </button>
    <button class="tab-item" data-screen="settings">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="tab-label">Mehr</span>
    </button>
  </nav>

</div>

<!-- Data layer -->
<script src="data/lessons.js"></script>
<script src="data/extra.js"></script>
<script src="data/modules.js"></script>
<script src="data/conversations.js"></script>

<!-- App layer -->
<script src="js/srs.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
